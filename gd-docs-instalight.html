<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
const {jsPDF}=window.jspdf;

// ── Constants ──────────────────────────────────────────────────────────────
const VOC_PP=41,RHO=0.01724,IRRAD=4.8,PR=0.75,TARIFA=0.85;
const API_URL='https://api.anthropic.com/v1/messages';
const MODEL='claude-sonnet-4-6';
const LS_KEY='instalight_api_key';

const INITIAL_FORM={
  tipoPessoa:'fisica',
  nomeCliente:'',cpfCnpj:'',endereco:'',codigoUC:'',numeroFatura:'',
  numContaContrato:'',consumoMensalKwh:'',
  tipoLigacao:'Monofásico',
  numeroPaineis:'',modeloPainel:'',potenciaUnitariaWp:'',
  paineisSerie:'',stringParalelo:'',
  modeloInversor:'',potenciaCAkW:'',tensaoEntradaCC:'',tensaoSaidaCA:'',
  quantidadeInversores:'1',
  secaoCaboCC:'6',comprimentoCabosCC:'',
  secaoCaboCA:'6',comprimentoCabosCA:'',
  secaoCaboAterr:'6',
  dpsCCTipo:'Tipo 2',dpsCCTensao:'1000',
  dpsCAipo:'Tipo 2',dpsCATensao:'275',
  disjuntorCC:'',disjuntorCA:'',
  aterramento:'Haste 5/8"',
  tipoTelhado:'Cerâmico',coordenadas:'',
  nomeEmpresa:'Instalight Energia Solar',
  cnpjEmpresa:'',enderecoEmpresa:'Porto Alegre, RS',
  nomeResponsavel:'',numeroCRT:'',
  numART:'',numProjeto:'',
  cidade:'Porto Alegre',dataproject:new Date().toLocaleDateString('pt-BR'),
};

// ── Motor de cálculos JS (nunca IA) ───────────────────────────────────────
const num=(v,d=0)=>parseFloat(v)||d;
const calcularSistema=(fd)=>{
  const np=num(fd.numeroPaineis),wp=num(fd.potenciaUnitariaWp),
        ns=num(fd.paineisSerie,1),npar=num(fd.stringParalelo,1),
        pca=num(fd.potenciaCAkW),qi=num(fd.quantidadeInversores,1),
        scc=num(fd.secaoCaboCC,6),sca=num(fd.secaoCaboCA,6),
        lcc=num(fd.comprimentoCabosCC,10),lca=num(fd.comprimentoCabosCA,5);
  const kWp=(np*wp)/1000;
  const kWtCA=pca*qi;
  const vocStr=ns*VOC_PP;
  const vocMax=vocStr*1.25;
  const iscStr=wp/VOC_PP;
  const iccTot=iscStr*npar;
  const iccN=iccTot*1.25;
  const tca=220;
  const faseF=fd.tipoLigacao==='Trifásico'?Math.sqrt(3):1;
  const iNomCA=kWtCA>0?(kWtCA*1000)/(tca*faseF):0;
  const iDimCA=iNomCA*1.25;
  const dvccV=scc>0?(2*lcc*iccN*RHO)/scc:0;
  const dvccP=vocStr>0?(dvccV/vocStr)*100:0;
  const dvcaV=sca>0?(2*lca*iNomCA*RHO)/sca:0;
  const dvcaP=tca>0?(dvcaV/tca)*100:0;
  const geracaoAnual=Math.round(kWp*IRRAD*PR*365);
  const economiaAnual=Math.round(geracaoAnual*TARIFA);
  const enq=kWp<=0?'—':kWp<=75?'Microgeração Distribuída':'Minigeração Distribuída';
  const prazo=kWp<=0?'—':kWp<=75?'15 dias (sem obra) / 30 dias (com obra)':'60 dias';
  // Potência disponibilizada (NT.00020.EQTL-06 Seção 5.3)
  const djCA=num(fd.disjuntorCA,50);
  const potDispKVA=+(( tca*djCA*faseF)/1000).toFixed(2);
  const potDispKW=+(potDispKVA*0.92).toFixed(2);
  // Impacto ambiental CO2 (fator SIN 0.10 kgCO2/kWh)
  const co2EvitadoAnual=Math.round(geracaoAnual*0.10);
  const arvoresEquivalente=Math.round(co2EvitadoAnual/25);
  const co2Em25Anos=co2EvitadoAnual*25;
  const consumoMensalKwh=num(fd.consumoMensalKwh,0);
  const percentualAtendimento=consumoMensalKwh>0?Math.min(100,+(geracaoAnual/(consumoMensalKwh*12)*100).toFixed(1)):null;
  return{
    kWp:+kWp.toFixed(2),kWtCA:+kWtCA.toFixed(2),
    vocStr:+vocStr.toFixed(1),vocMax:+vocMax.toFixed(1),
    iscStr:+iscStr.toFixed(2),iccTot:+iccTot.toFixed(2),iccN:+iccN.toFixed(2),
    iNomCA:+iNomCA.toFixed(2),iDimCA:+iDimCA.toFixed(2),
    dvccV:+dvccV.toFixed(2),dvccP:+dvccP.toFixed(2),
    dvcaV:+dvcaV.toFixed(2),dvcaP:+dvcaP.toFixed(2),
    iDjCCMin:+iccN.toFixed(1),iDjCAMin:+iDimCA.toFixed(1),
    geracaoAnual,economiaAnual,enq,prazo,
    potDispKVA,potDispKW,
    co2EvitadoAnual,arvoresEquivalente,co2Em25Anos,percentualAtendimento,
  };
};

// ── Template do Memorial (80% JS, 20% IA) ─────────────────────────────────
const buildMemorialTemplate=(fd,calc)=>{
  const nf=fd.tipoLigacao==='Trifásico'?'√3 ≈ 1,732':'1';
  const fases={'Monofásico':'2 (fase + neutro)','Bifásico':'3 (duas fases + neutro)','Trifásico':'4 (três fases + neutro + terra)'};
  const tensoes={'Monofásico':'220 V','Bifásico':'220 V','Trifásico':'380/220 V'};
  const fixacoes={
    'Cerâmico':'estrutura de alumínio anodizado com trilhos e grampos específicos para telha cerâmica, fixados com parafusos de inox nas ripas de madeira do caibramento existente',
    'Metálico':'estrutura de alumínio anodizado com perfis e grampos para telha metálica trapezoidal, fixados com parafusos autoperfurantes de inox com vedação EPDM',
    'Fibrocimento':'estrutura de alumínio anodizado com ganchos de inox especiais para fibrocimento, fixados com parafusos estruturais de 200 mm de comprimento mínimo nas terças',
    'Laje':'estrutura de alumínio com perfis inclinados (ângulo ótimo de inclinação) fixados em blocos de concreto lastro sobre laje impermeabilizada, sem perfuração',
    'Solo':'estrutura de alumínio com perfis cravados ou ancorados em fundações de concreto no terreno, orientados para norte geográfico no ângulo de inclinação ótimo',
  };
  const c=calc;
  const f=fd;
  const hoje=f.dataproject||new Date().toLocaleDateString('pt-BR');
  const nPaineis=f.numeroPaineis||'[INSERIR]';
  const modPainel=f.modeloPainel||'[INSERIR MODELO]';
  const wpPainel=f.potenciaUnitariaWp||'[INSERIR]';
  const nSerie=f.paineisSerie||'[INSERIR]';
  const nPar=f.stringParalelo||'[INSERIR]';
  const modInv=f.modeloInversor||'[INSERIR MODELO]';
  const potCAkW=f.potenciaCAkW||'[INSERIR]';
  const nInv=f.quantidadeInversores||'1';
  const VinCC=f.tensaoEntradaCC||'[INSERIR]';
  const VoutCA=f.tensaoSaidaCA||'220';
  const djCC=f.disjuntorCC||c.iDjCCMin||'[INSERIR]';
  const djCA=f.disjuntorCA||c.iDjCAMin||'[INSERIR]';

  return `MEMORIAL TÉCNICO-DESCRITIVO
SISTEMA DE ${c.enq.toUpperCase()} FOTOVOLTAICA — ON GRID
Elaborado conforme NT.00020.EQTL-06 (CEEE Equatorial) e ABNT NBR 16690

LISTA DE SIGLAS E ABREVIATURAS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
ABNT  Associação Brasileira de Normas Técnicas
ANEEL Agência Nacional de Energia Elétrica
BT    Baixa Tensão

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

4.1 Tipo de Ligação e Tensão de Atendimento
• Tipo:             ${f.tipoLigacao}
• Número de fases:  ${fases[f.tipoLigacao]||'[VERIFICAR]'}
• Tensão nominal:   ${tensoes[f.tipoLigacao]||'220 V'} / 60 Hz

4.2 Disjuntor de Entrada
• Corrente nominal (IDG): ${djCA} A
• Número de pólos:        ${f.tipoLigacao==='Monofásico'?'2 (bipolar)':f.tipoLigacao==='Bifásico'?'3 (tripolar)':'3 (tripolar)'}
• Curva de atuação:       C
• Elemento de proteção:   Termomagnético

4.3 Potência Disponibilizada — Fórmula (NT.00020.EQTL-06 Seção 5.3)
  PD [kVA] = (VN × IDG × NF) / 1000
  PD [kVA] = (220 × ${djCA} × ${nf}) / 1000 = ${c.potDispKVA} kVA
  PD [kW]  = PD [kVA] × FP = ${c.potDispKVA} × 0,92 = ${c.potDispKW} kW

A potência de injeção do gerador (${c.kWtCA} kW CA) ${c.kWtCA<=c.potDispKW?'é inferior ou igual à':'supera a'} potência disponibilizada (${c.potDispKW} kW), ${c.kWtCA<=c.potDispKW?'atendendo':'não atendendo'} ao requisito normativo.

Configuração: ${nSerie} módulos em série × ${nPar} strings em paralelo = ${nPaineis} módulos totais

5.3 Queda de Tensão em Corrente Contínua

Fórmula aplicada: ΔV = (2 × L × I × ρ) / S
Onde:
  L = ${f.comprimentoCabosCC||'[L]'} m (comprimento do circuito CC)
  I = ${c.iccN} A (corrente de dimensionamento)
  ρ = 0,01724 Ω·mm²/m (resistividade do cobre a 20°C)
  S = ${f.secaoCaboCC||'6'} mm² (seção transversal do condutor)

  ΔV(CC) = (2 × ${f.comprimentoCabosCC||'?'} × ${c.iccN} × 0,01724) / ${f.secaoCaboCC||'6'} = ${c.dvccV} V
  ΔV(CC)% = ${c.dvccV} / ${c.vocStr} × 100 = ${c.dvccP}%

${c.dvccP<=3?'✔ Queda de tensão CC dentro do limite admissível de 3% (NBR 16690).':'⚠ Verificar bitola do cabo CC — queda superior a 3% (NBR 16690).'}

12.1 Inspeção Prévia — Sistema CC
□ Verificar conformidade dos equipamentos instalados com o projeto aprovado
□ Verificar ligações entre módulos, String Box e inversor
□ Confirmar Voc e Isc de cada string individualmente
□ Verificar classes de isolamento e dupla isolação dos cabos CC
□ Verificar instalação dos conectores MC4 (travamento e estanqueidade)
□ Verificar operacionalidade das chaves seccionadoras CC
□ Verificar continuidade do condutor de proteção (PE)
□ Verificar etiquetagem permanente e durável em todos os componentes CC

12.2 Inspeção Prévia — Sistema CA
□ Verificar aparelho de comando para isolamento dos inversores
□ Verificar compatibilidade dos inversores com a rede pública (tensão, frequência)
□ Verificar etiquetagem de todos os equipamentos CA
□ Verificar esquema elétrico afixado junto ao quadro de comando
□ Verificar instruções de desligamento de emergência afixadas

12.3 Testes e Ensaios

12.3.1 Continuidade do Condutor de Proteção
Procedimento: Medir resistência entre todas as partes metálicas não-ativas e o barramento de terra.
Critério de aceitação: Continuidade confirmada (≤ 0,5 Ω).

12.3.2 Verificação de Polaridade
Procedimento: Verificar polaridade de cada string antes da conexão ao inversor.
Critério de aceitação: Polaridade correta confirmada em 100% das strings.

12.3.3 Tensão de Circuito Aberto (Voc) das Strings
Procedimento: Medir Voc de cada string individualmente com multímetro adequado para CC.
Valor esperado de projeto: ${c.vocStr} V (em STC: 1000 W/m², 25°C).
Critério de aceitação: Variação ≤ ±5% entre strings e em relação ao valor de projeto.

12.3.4 Corrente de Curto-Circuito (Isc) das Strings
Procedimento: Medir Isc utilizando equipamento apropriado (amperímetro de alicate).
Valor esperado de projeto: ${c.iscStr} A por string.
Critério de aceitação: Variação ≤ ±5% entre strings.

12.3.5 Corrente Operacional das Strings
Procedimento: Medir corrente de cada string em operação normal (irradiação > 700 W/m²).
Critério de aceitação: Variação ≤ ±5% entre strings.

12.3.6 Ensaios Funcionais
□ Verificar operacionalidade de todos os aparelhos de comando e sinalização
□ Verificar indicadores e display dos inversores (sem alarmes ativos)
□ Testar função anti-ilhamento (conforme manual do inversor)
□ Confirmar injeção de energia na rede (medidor avançando no sentido correto)

12.3.7 Resistência de Isolamento das Strings
IMPORTANTE: Executar com no mínimo duas pessoas. Bloquear acesso à área.
Procedimento: Aplicar tensão de ensaio entre os condutores CC e a terra.
Curto-circuitar os terminais + e − para medição com megôhmetro.
Critério de aceitação: Resistência de isolamento ≥ 1 MΩ.
Após o ensaio: descarregar os cabos antes de reconectar.

12.3.8 Inspeção Termográfica (recomendada)
Equipamento: câmera de imagem térmica (resolução mínima 160×120 px).
Pontos de inspeção: frente dos módulos FV, diodos de bypass, String Box, conectores MC4.
Critério de aceitação: ausência de hotspots (pontos quentes > 10°C acima da média).

13. EXPLORAÇÃO E MANUTENÇÃO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
13.1 Periodicidade de Verificações
• Primeiros 5 anos de operação: ensaios e inspeções ANUAIS
• A partir do 6° ano: ensaios e inspeções A CADA 2 ANOS
• Inspeção visual dos módulos: SEMESTRAL (limpeza e verificação de danos)

Ensaios periódicos recomendados (mesmos do comissionamento):
• Continuidade do condutor de proteção
• Tensão de circuito aberto e corrente das strings
• Ensaios funcionais do inversor
• Resistência de isolamento dos condutores CC
• Inspeção termográfica

13.2 Operações em Caso de Falha
I.   Falha em módulo individual: acionar chave seccionadora da string correspondente
II.  Falha no inversor: desligar disjuntor CA + todas as chaves seccionadoras CC
III. Falha geral: desligar disjuntor geral CA + todas as seccionadoras + informar distribuidora

13.3 Procedimento de Desligamento de Emergência
1. Desligar o disjuntor geral do QGBT (interrompe CA)
2. Desligar o disjuntor CA-FV no Quadro CA
3. Desligar todas as chaves seccionadoras na String Box
4. Aguardar descarga dos capacitores do inversor (mínimo 5 minutos)
5. Afixar etiqueta de bloqueio: "SISTEMA EM MANUTENÇÃO — NÃO ENERGIZAR"

13.4 Manutenção dos Módulos FV
• Limpeza com água e esponja macia (evitar abrasivos e solventes)
• Não pisar sobre os módulos
• Verificar integridade do vidro frontal e junções de borracha
• Verificar fixação dos grampos e trilhos (torque conforme fabricante)

13.5 Manutenção do Inversor
• Seguir rigorosamente o manual do fabricante
• Limpar filtros de ventilação conforme periodicidade indicada
• Verificar DPS (indicador luminoso): substituir se ativado
• Aguardar descarga dos capacitores (≥ 5 min) antes de qualquer intervenção interna

14. NOTAS DE SEGURANÇA — NR-10
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
• Todos os serviços elétricos devem ser executados por profissionais habilitados e autorizados conforme NR-10 (Portaria MTE 598/2004).
• Os módulos fotovoltaicos geram tensão CC assim que expostos à luz, mesmo em situações de emergência — não há forma de interromper a geração CC sem bloquear fisicamente a luz solar.
• A tensão CC do barramento pode atingir ${c.vocMax} V. Utilizar EPI adequado (luvas isolantes, capacetes e óculos de proteção) durante manutenção.
• Sinalizar e isolar a área de trabalho antes de qualquer intervenção.
• Em caso de incêndio: NUNCA usar água no sistema — utilizar extintor de CO₂ ou pó químico. Notificar o Corpo de Bombeiros informando a presença de sistema fotovoltaico.
• Manter o Livro de Inspeção e os registros de ensaios disponíveis na instalação.

const fileToBase64=(file)=>new Promise((res,rej)=>{

  reader.readAsDataURL(file);
});

};

const addTextBlock=(doc,text,marginL,marginR,startY,lineH=5.5)=>{
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
  const maxW=W-marginL-marginR;
  let y=startY;
  const lines=text.split('\n');
  lines.forEach(raw=>{
    const bold=raw.startsWith('**')&&raw.endsWith('**');
    const clean=bold?raw.slice(2,-2):raw;
    if(bold){doc.setFont('helvetica','bold');}else{doc.setFont('helvetica','normal');}
    const wrapped=doc.splitTextToSize(clean,maxW);
    wrapped.forEach(line=>{
      if(y>H-20){doc.addPage();y=30;}
      doc.text(line,marginL,y);
      y+=lineH;
    });
    if(bold)doc.setFont('helvetica','normal');
  });
  return y;
};

// ── Diagrama Multifilar Melhorado ──────────────────────────────────────────
const DiagramaMultifilarMelhorado=({fd,calc})=>{
  const tipo=fd.tipoLigacao||'Monofásico';
  const nStr=Math.min(Math.max(num(fd.stringParalelo,1),1),4);
  const red='#dc2626',blk='#1a1a2e',org='#f97316',grn='#16a34a',blu='#3b82f6',brn='#92400e',gry='#64748b';
  const condCA={'Monofásico':[{l:'L1',c:blk},{l:'N',c:blu},{l:'PE',c:grn,da:'5,3'}],'Bifásico':[{l:'L1',c:blk},{l:'L2',c:brn},{l:'N',c:blu},{l:'PE',c:grn,da:'5,3'}],'Trifásico':[{l:'L1',c:blk},{l:'L2',c:brn},{l:'L3',c:gry},{l:'N',c:blu},{l:'PE',c:grn,da:'5,3'}]};
  const conds=condCA[tipo]||condCA['Monofásico'];
  const GFX=55,SBX=210,INX=410,QDX=610,MTX=800,RDX=970;
  const strSp=36,ccY0=62;
  const strYs=Array.from({length:nStr},(_,i)=>ccY0+i*strSp);
  const caSp=30,caTH=(conds.length-1)*caSp;
  const caY0=Math.max(ccY0+nStr*strSp+14,180)-caTH/2;
  const SPEC_CC=`#${fd.secaoCaboCC||'6'}mm² PVC 70° 750V`;
  const SPEC_CA=`#${fd.secaoCaboCA||'6'}mm² PVC 70° 750V`;

  return(
    <g>
      {/* Título */}
      <text x={500} y={18} fontSize="11" fill={blk} textAnchor="middle" fontWeight="700" fontFamily="sans-serif">DIAGRAMA MULTIFILAR — {tipo.toUpperCase()}</text>
      <line x1={320} y1={22} x2={680} y2={22} stroke={org} strokeWidth="1.5"/>
      {/* Separador CC / CA */}
      <line x1={INX} y1={28} x2={INX} y2={310} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="4,3"/>
      <text x={(GFX+INX)/2} y={48} fontSize="7" fill={gry} textAnchor="middle" fontFamily="sans-serif">SEÇÃO CC — {SPEC_CC}</text>
      <text x={(INX+RDX+30)/2} y={48} fontSize="7" fill={gry} textAnchor="middle" fontFamily="sans-serif">SEÇÃO CA — {SPEC_CA}</text>

      {/* Blocos */}
      <rect x={GFX-30} y={ccY0-8} width={60} height={nStr*strSp+4} rx="4" fill="white" stroke={blk} strokeWidth="1.5"/>
      <text x={GFX} y={ccY0+2} fontSize="7" fill={blk} textAnchor="middle" fontWeight="600" fontFamily="sans-serif">GER.FV</text>
      <rect x={SBX-28} y={ccY0-8} width={56} height={nStr*strSp+4} rx="4" fill="white" stroke={blk} strokeWidth="1.5"/>
      <text x={SBX} y={ccY0+2} fontSize="7" fill={blk} textAnchor="middle" fontWeight="600" fontFamily="sans-serif">STR.BOX</text>
      <rect x={INX-44} y={ccY0-8} width={88} height={Math.max(nStr*strSp,caTH)+34} rx="6" fill="white" stroke={org} strokeWidth="2"/>
      <text x={INX} y={ccY0+4} fontSize="8" fill={org} textAnchor="middle" fontWeight="700" fontFamily="sans-serif">INVERSOR</text>
      <text x={INX} y={ccY0+16} fontSize="6" fill={gry} textAnchor="middle" fontFamily="sans-serif">{fd.modeloInversor||'—'}</text>
      <rect x={QDX-28} y={caY0-10} width={56} height={caTH+20} rx="4" fill="white" stroke={blk} strokeWidth="1.5"/>
      <text x={QDX} y={caY0} fontSize="7" fill={blk} textAnchor="middle" fontWeight="600" fontFamily="sans-serif">QDC CA</text>
      <rect x={MTX-26} y={caY0-10} width={52} height={caTH+20} rx="4" fill="white" stroke={grn} strokeWidth="1.5"/>
      <text x={MTX} y={caY0} fontSize="7" fill={grn} textAnchor="middle" fontWeight="600" fontFamily="sans-serif">MEDIDOR</text>
      <rect x={RDX-18} y={caY0-10} width={36} height={caTH+20} rx="4" fill="white" stroke={gry} strokeWidth="1.5"/>
      <text x={RDX} y={caY0} fontSize="7" fill={gry} textAnchor="middle" fontWeight="600" fontFamily="sans-serif">REDE</text>

      {/* Condutores CC */}
      {strYs.map((sy,i)=>(
        <g key={`cc${i}`}>
          <line x1={GFX+30} y1={sy+6} x2={SBX-28} y2={sy+6} stroke={red} strokeWidth="2"/>
          <line x1={SBX+28} y1={sy+6} x2={INX-44} y2={sy+6} stroke={red} strokeWidth="2"/>
          <line x1={GFX+30} y1={sy+18} x2={SBX-28} y2={sy+18} stroke={blk} strokeWidth="2"/>
          <line x1={SBX+28} y1={sy+18} x2={INX-44} y2={sy+18} stroke={blk} strokeWidth="2"/>
          <text x={(GFX+30+SBX-28)/2} y={sy+2} fontSize="6" fill={red} textAnchor="middle" fontFamily="sans-serif">Str{i+1}(+)</text>
          <text x={(GFX+30+SBX-28)/2} y={sy+28} fontSize="6" fill={blk} textAnchor="middle" fontFamily="sans-serif">Str{i+1}(&#8722;)</text>
          <circle cx={SBX} cy={sy+6} r="4" fill="white" stroke={red} strokeWidth="1.2"/>
          <circle cx={SBX} cy={sy+18} r="4" fill="white" stroke={blk} strokeWidth="1.2"/>
          <text x={GFX} y={sy+16} fontSize="6" fill={gry} textAnchor="middle" fontFamily="sans-serif">S{i+1}</text>
        </g>
      ))}

      {/* Condutores CA */}
      {conds.map((c,i)=>{
        const y=caY0+i*caSp;
        const isPE=c.l==='PE';
        const isN=c.l==='N';
        return(
          <g key={`ca${i}`}>
            <line x1={INX+44} y1={y} x2={QDX-28} y2={y} stroke={c.c} strokeWidth={isPE?1.5:2} strokeDasharray={c.da}/>
            <line x1={QDX+28} y1={y} x2={MTX-26} y2={y} stroke={c.c} strokeWidth={isPE?1.5:2} strokeDasharray={c.da}/>
            <line x1={MTX+26} y1={y} x2={RDX+24} y2={y} stroke={c.c} strokeWidth={isPE?1.5:2} strokeDasharray={c.da}/>
            <circle cx={INX+44} cy={y} r="7" fill={c.c} opacity="0.12"/>
            <text x={INX+44} y={y+4} fontSize="7" fill={c.c} textAnchor="middle" fontWeight="700" fontFamily="sans-serif">{c.l}</text>
            <circle cx={RDX+24} cy={y} r="7" fill={c.c} opacity="0.12"/>
            <text x={RDX+24} y={y+4} fontSize="7" fill={c.c} textAnchor="middle" fontWeight="700" fontFamily="sans-serif">{c.l}</text>
            {!isPE&&!isN&&(
              <g>
                <circle cx={QDX} cy={y} r="6" fill="white" stroke={c.c} strokeWidth="1.5"/>
                <line x1={QDX-4} y1={y-3} x2={QDX+4} y2={y+3} stroke={c.c} strokeWidth="1.5"/>
                <text x={QDX} y={y+15} fontSize="6" fill={c.c} textAnchor="middle" fontFamily="sans-serif">{fd.disjuntorCA||'—'}A</text>
              </g>
            )}
            <text x={(INX+44+QDX-28)/2} y={y-4} fontSize="6" fill={gry} textAnchor="middle" fontFamily="sans-serif">{isPE?fd.secaoCaboAterr||'6':fd.secaoCaboCA||'6'}mm²</text>
          </g>
        );
      })}
      <text x={GFX} y={ccY0+nStr*strSp+18} fontSize="6" fill={gry} textAnchor="middle" fontFamily="sans-serif">{num(fd.stringParalelo,1)}&#215;{num(fd.paineisSerie,1)} painéis</text>
      <text x={GFX} y={ccY0+nStr*strSp+28} fontSize="6" fill={gry} textAnchor="middle" fontFamily="sans-serif">{fd.potenciaUnitariaWp||'—'}Wp ea.</text>
      <text x={MTX} y={caY0+caTH+18} fontSize="6" fill={grn} textAnchor="middle" fontFamily="sans-serif">Bidirecional CEEE</text>
    </g>
  );
};

// ── Upload Module ──────────────────────────────────────────────────────────
const UploadModule=({apiKey,onExtract,uploadedFiles,setUploadedFiles,extractingData,setExtractingData})=>{
  const [drag,setDrag]=useState(false);
  const inputRef=useRef();

  const handleFiles=(files)=>{
    const valid=[...files].filter(f=>
      ['application/pdf','image/jpeg','image/png','image/webp'].includes(f.type)
    );
    setUploadedFiles(p=>[...p,...valid]);
  };

  const onDrop=(e)=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);};

  const extract=async()=>{
    if(!apiKey){alert('Informe sua API Key primeiro.');return;}
    if(!uploadedFiles.length){alert('Adicione pelo menos um arquivo.');return;}
    setExtractingData(true);
    try{
      const parts=await Promise.all(uploadedFiles.map(async f=>{
        const data=await fileToBase64(f);
        if(f.type==='application/pdf')
          return{type:'document',source:{type:'base64',media_type:'application/pdf',data}};
        return{type:'image',source:{type:'base64',media_type:f.type,data}};
      }));
      const schema=`{
"nomeCliente":"","cpfCnpj":"","endereco":"","codigoUC":"","numeroFatura":"",
"tipoLigacao":"","numeroPaineis":null,"modeloPainel":"","potenciaUnitariaWp":null,
"paineisSerie":null,"stringParalelo":null,
"modeloInversor":"","potenciaCAkW":null,"tensaoEntradaCC":null,"tensaoSaidaCA":null,
"quantidadeInversores":null,"dpsCCTipo":"","dpsCCTensao":null,
"dpsCAipo":"","dpsCATensao":null,"disjuntorCC":null,"disjuntorCA":null,
"aterramento":"","nomeResponsavel":"","numeroCRT":"","cidade":"",
"confiancaExtracao":"alta|media|baixa","camposNaoEncontrados":[],"observacoes":""}`;
      const res=await callAPI(
        apiKey,
        'Você é um assistente especializado em extração de dados de documentos de sistemas fotovoltaicos. Extraia exatamente os dados solicitados e retorne APENAS JSON válido, sem markdown.',
        [{role:'user',content:[
          ...parts,
          {type:'text',text:`Extraia os dados técnicos e do cliente destes documentos e retorne JSON no formato exato:\n${schema}\n\nSe um campo não for encontrado, deixe null ou "". Informe confiancaExtracao com base na qualidade dos dados encontrados.`}
        ]}],
        2000
      );
      const txt=res.content[0].text;
      const json=JSON.parse(txt.replace(/```json\n?|\n?```/g,'').trim());
      onExtract(json);
    }catch(e){
      alert('Erro ao extrair dados: '+e.message);
    }finally{
      setExtractingData(false);
    }
  };

  return(
    <div className="mb-4">
      <div className="flex items-center justify-between mb-2">
        <span className="text-xs font-semibold text-slate-600 uppercase tracking-wider">Extração de Dados por IA</span>
      </div>
      <div
        onDragOver={e=>{e.preventDefault();setDrag(true);}}
        onDragLeave={()=>setDrag(false)}
        onDrop={onDrop}
        onClick={()=>inputRef.current.click()}
        className={`border-2 border-dashed rounded-lg p-4 text-center cursor-pointer transition-colors ${drag?'border-orange-400 bg-orange-50':'border-slate-300 hover:border-orange-300'}`}
      >
        <div className="text-2xl mb-1">📄</div>
        <p className="text-xs text-slate-500">Arraste faturas, datasheets, fichas técnicas</p>
        <p className="text-xs text-slate-400">PDF, JPG, PNG, WEBP</p>
        <input ref={inputRef} type="file" multiple accept=".pdf,image/*" className="hidden" onChange={e=>handleFiles(e.target.files)}/>
      </div>
      {uploadedFiles.length>0&&(
        <div className="mt-2 space-y-1">
          {uploadedFiles.map((f,i)=>(
            <div key={i} className="flex items-center justify-between bg-slate-50 rounded px-2 py-1 text-xs">
              <span className="truncate text-slate-700">{f.type==='application/pdf'?'📄':'🖼️'} {f.name}</span>
              <button onClick={()=>setUploadedFiles(p=>p.filter((_,j)=>j!==i))} className="text-slate-400 hover:text-red-400 ml-1">×</button>
            </div>
          ))}
          <button
            onClick={extract}
            disabled={extractingData||!apiKey}
            className="w-full mt-1 py-2 text-xs font-semibold rounded bg-orange-500 hover:bg-orange-600 text-white disabled:opacity-50 flex items-center justify-center gap-2"
          >
            {extractingData?(<><span className="spinner"/><span>Analisando…</span></>):'🤖 Extrair dados com IA'}
          </button>
        </div>
      )}
    </div>
  );
};

        {label}{isAI&&<span className="ml-1 text-orange-400">✨</span>}
      </label>
      {options?(
        <select name={name} value={value} onChange={onChange} className={cls}>
          {options.map(o=><option key={o} value={o}>{o}</option>)}
        </select>
      ):(
        <input
          type={type}
          name={name}
          value={value}
          onChange={onChange}
          readOnly={readonly}
          placeholder={placeholder}
          className={cls+(readonly?' bg-slate-50 text-slate-400':'')}

const DiagramasTab=({fd,calc,svgRef})=>{
  const exportSVG=()=>{
    const svg=svgRef.current;
    if(!svg)return;
    const s=new XMLSerializer().serializeToString(svg);
    const b=new Blob([s],{type:'image/svg+xml'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download=`prancha_${fd.nomeCliente||'instalight'}.svg`;
    a.click();
  };

  const exportPDF=async()=>{
    const svg=svgRef.current;
    if(!svg)return;
    try{
      const canvas=await html2canvas(svg,{scale:1.5,useCORS:true,backgroundColor:'white'});
      const img=canvas.toDataURL('image/jpeg',0.92);
      const doc=makePDF('l','a3');
      const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight();
      doc.addImage(img,'JPEG',5,5,W-10,H-10);
      doc.save(`prancha_${fd.nomeCliente||'instalight'}.pdf`);
    }catch(e){alert('Erro ao gerar PDF: '+e.message);}
  };

  return(
    <div className="flex flex-col h-full">
      <div className="flex items-center justify-between p-3 border-b border-slate-200 bg-white">
        <div>
          <h2 className="font-semibold text-slate-800">Prancha Elétrica — Unifilar + Pluri</h2>
          <p className="text-xs text-slate-500">Atualiza em tempo real conforme o formulário</p>
        </div>
        <div className="flex gap-2">
          <button onClick={exportSVG} className="px-3 py-1.5 text-xs font-medium rounded border border-orange-300 text-orange-600 hover:bg-orange-50">

              </div>
              <div className="flex gap-2">
                <button onClick={gerarProcuracao} className="px-3 py-1.5 text-xs font-semibold rounded bg-orange-500 text-white hover:bg-orange-600">
                  Gerar / Atualizar
                </button>
                {procuracao&&(<>
                  <button onClick={refinarProcuracao} disabled={refiningProc||!apiKey}
                    className="px-3 py-1.5 text-xs font-medium rounded border border-orange-300 text-orange-600 hover:bg-orange-50 disabled:opacity-50 flex items-center gap-1">
                    {refiningProc?<><span className="spinner"/><span>Refinando…</span></>:'✨ Refinar com IA'}
                  </button>
                  <button onClick={exportProcuracaoPDF} className="px-3 py-1.5 text-xs font-medium rounded border border-slate-300 text-slate-600 hover:bg-slate-50">
                    Exportar PDF
                  </button>
                </>)}
              </div>
            </div>
            {procuracao?(
              <div className="doc-preview">{procuracao}</div>
            ):(
              <div className="text-center py-12 text-slate-400">
                <div className="text-4xl mb-3">📜</div>
                <p className="text-sm">Clique em "Gerar / Atualizar" para criar a procuração</p>
              </div>
            )}
          </div>
        )}
        {activeDoc==='formulario'&&(
          <div className="max-w-3xl mx-auto">
            <div className="flex items-center justify-between mb-3">
              <div>
                <h3 className="font-semibold text-slate-800">Formulário de Solicitação de Acesso CEEE</h3>
                <p className="text-xs text-slate-500">Preenchido automaticamente com os dados do formulário</p>
              </div>
              <button onClick={exportFormularioPDF} className="px-3 py-1.5 text-xs font-semibold rounded bg-orange-500 text-white hover:bg-orange-600">
                Exportar PDF
              </button>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 mb-3 text-xs text-amber-700">
              ⚠️ Baseado no modelo CEEE Equatorial vigente. Verifique atualizações no portal da distribuidora.
            </div>
            <div className="doc-preview">{formCEEEPreview}</div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Aba Resumo ─────────────────────────────────────────────────────────────
const ResumoTab=({fd,calc,docsGerados,setToast})=>{
  const cards=[
    {label:'Potência CC',value:`${calc.kWp} kWp`,icon:'☀️',color:'orange'},
    {label:'Potência CA total',value:`${calc.kWtCA} kW`,icon:'⚡',color:'blue'},
    {label:'Enquadramento',value:calc.enq,icon:'📋',color:'green'},
    {label:'Geração anual est.',value:`${calc.geracaoAnual.toLocaleString('pt-BR')} kWh`,icon:'📊',color:'purple'},
    {label:'Prazo análise CEEE',value:calc.prazo,icon:'⏱️',color:'slate'},
    {label:'Economia anual est.',value:`R$ ${calc.economiaAnual.toLocaleString('pt-BR')}`,icon:'💰',color:'emerald'},
    {label:'CO₂ evitado/ano',value:`${calc.co2EvitadoAnual.toLocaleString('pt-BR')} kg`,icon:'🌿',color:'teal'},
    {label:'Árvores equiv./ano',value:`${calc.arvoresEquivalente} árvores`,icon:'🌳',color:'lime'},
  ];

  const colorMap={orange:'bg-orange-50 border-orange-200 text-orange-700',blue:'bg-blue-50 border-blue-200 text-blue-700',
    green:'bg-green-50 border-green-200 text-green-700',purple:'bg-purple-50 border-purple-200 text-purple-700',
    slate:'bg-slate-50 border-slate-200 text-slate-700',emerald:'bg-emerald-50 border-emerald-200 text-emerald-700',
    teal:'bg-teal-50 border-teal-200 text-teal-700',lime:'bg-lime-50 border-lime-200 text-lime-700'};

  const groupA=[
    {id:'A1',doc:'Procuração Específica',gerado:docsGerados.procuracao,como:'Gere na aba "Documentos" e peça ao cliente assinar com firma reconhecida'},
    {id:'A2',doc:'Formulário de Acesso CEEE',gerado:docsGerados.formularioCEEE,como:'Gere na aba "Documentos" e leve ao protocolo CEEE'},
    {id:'A3',doc:'Documentos pessoais (RG+CPF / CNPJ+Contrato Social)',gerado:false,como:fd.tipoPessoa==='fisica'?'Solicitar cópia do RG e CPF do titular':'Solicitar CNPJ, Contrato Social e documento do representante'},
    {id:'A4',doc:'Fatura de energia recente',gerado:false,como:'Solicitar fatura dos últimos 3 meses'},
  ];

  const groupB=[
    {id:'B1',doc:'Diagrama Unifilar',gerado:true,como:'Disponível na aba "Diagramas" — exportar SVG ou PDF'},
    {id:'B2',doc:'Diagrama Pluri (Bi/Trifilar)',gerado:true,como:'Incluído na mesma prancha da aba "Diagramas"'},
    {id:'B3',doc:'Planta de Situação / Locação',gerado:false,como:'Providenciar foto aérea ou print do Google Maps com escala'},
    {id:'B4',doc:'Memorial Técnico-Descritivo',gerado:docsGerados.memorial,como:'Gere na aba "Memorial" e valide com o RT'},
    {id:'B5',doc:'TRT/ART (Responsabilidade Técnica)',gerado:false,como:'RT deve assinar a ART no sistema do CREA/CFT'},
    {id:'B6',doc:'Data Sheets dos equipamentos',gerado:false,como:'Baixar do site do fabricante e incluir no dossiê'},
  ];

  const exportPendencias=()=>{
    const doc=makePDF('p','a4');
    const W=doc.internal.pageSize.getWidth();
    pdfHeader(doc,fd);
    doc.setFontSize(13);doc.setFont('helvetica','bold');
    doc.text('RELATÓRIO DE PENDÊNCIAS — PROTOCOLO CEEE',W/2,35,{align:'center'});
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(`Cliente: ${fd.nomeCliente||'—'} | UC: ${fd.codigoUC||'—'} | Sistema: ${calc.kWp}kWp`,W/2,43,{align:'center'});

    let y=54;
    const sect=(title)=>{
      y+=4;doc.setFont('helvetica','bold');doc.setFontSize(10);
      doc.setFillColor(249,115,22);doc.rect(14,y-5,W-28,8,'F');
      doc.setTextColor(255);doc.text(title,16,y);
      doc.setTextColor(30);doc.setFont('helvetica','normal');doc.setFontSize(9);
      y+=8;
    };
    const item=(id,dname,done,como)=>{
      const status=done?'✅ GERADO':'⏳ PENDENTE';
      doc.setFont('helvetica','bold');
      doc.text(`${id} — ${dname}`,14,y);y+=5;
      doc.setFont('helvetica','normal');doc.setTextColor(done?34:180,done?139:100,done?34:0);
      doc.text(status,14,y);doc.setTextColor(30);
      if(!done){doc.setTextColor(80);doc.text(`  Como obter: ${como}`,14,y+5);y+=5;}
      y+=9;if(y>H-20){doc.addPage();pdfHeader(doc,fd);y=35;}
    };
    const H=doc.internal.pageSize.getHeight();

    sect('GRUPO A — DOCUMENTOS DO CLIENTE');
    groupA.forEach(g=>item(g.id,g.doc,g.gerado,g.como));
    sect('GRUPO B — DOCUMENTOS TÉCNICOS');
    groupB.forEach(g=>item(g.id,g.doc,g.gerado,g.como));

    y+=4;doc.setFontSize(8);doc.setTextColor(100);
    doc.text('Dúvidas? Entre em contato com a Instalight.',14,y);

    pdfFooter(doc,fd,1,1);
    doc.save(`pendencias_${fd.nomeCliente||'instalight'}.pdf`);
    setToast({message:'Relatório de pendências exportado!',type:'success'});
  };

  const CheckItem=({id,doc,gerado,como})=>(
    <div className={`flex items-start gap-3 p-3 rounded-lg border ${gerado?'bg-green-50 border-green-200':'bg-slate-50 border-slate-200'}`}>
      <span className="text-lg flex-shrink-0">{gerado?'✅':'⏳'}</span>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className="text-xs font-bold text-slate-500">{id}</span>
          <span className={`text-sm font-medium ${gerado?'text-green-700':'text-slate-700'}`}>{doc}</span>
        </div>
        {!gerado&&<p className="text-xs text-slate-500 mt-0.5">{como}</p>}
        {gerado&&<p className="text-xs text-green-600 mt-0.5">Gerado pelo app</p>}
      </div>
    </div>
  );

  return(
    <div className="flex flex-col h-full overflow-auto">
      <div className="p-3 border-b border-slate-200 bg-white flex items-center justify-between">
        <div>
          <h2 className="font-semibold text-slate-800">Resumo do Projeto + Checklist de Protocolo</h2>
          <p className="text-xs text-slate-500">Acompanhe o status de todos os documentos necessários</p>
        </div>
        <button onClick={exportPendencias} className="px-4 py-1.5 text-xs font-semibold rounded bg-orange-500 text-white hover:bg-orange-600">
          📄 Gerar PDF de Pendências
        </button>
      </div>
      <div className="flex-1 p-4 space-y-6">
        {/* Cards */}
        <div className="grid grid-cols-3 gap-3">
          {cards.map(c=>(
            <div key={c.label} className={`rounded-lg border p-3 ${colorMap[c.color]}`}>
              <div className="text-xl mb-1">{c.icon}</div>
              <div className="text-xs opacity-70 mb-0.5">{c.label}</div>
              <div className="font-bold text-sm">{c.value}</div>
            </div>
          ))}
        </div>
        {/* Checklist A */}
        <div>
          <h3 className="font-semibold text-slate-700 mb-2 flex items-center gap-2">
            <span className="bg-orange-100 text-orange-700 text-xs font-bold px-2 py-0.5 rounded">GRUPO A</span>
            Documentos do Cliente
          </h3>
          <div className="space-y-2">
            {groupA.map(g=><CheckItem key={g.id} {...g}/>)}
          </div>
        </div>
        {/* Checklist B */}
        <div>
          <h3 className="font-semibold text-slate-700 mb-2 flex items-center gap-2">
            <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded">GRUPO B</span>
            Documentos Técnicos
          </h3>
          <div className="space-y-2">
            {groupB.map(g=><CheckItem key={g.id} {...g}/>)}
          </div>
        </div>
      </div>
    </div>
  );
};

// ── App principal ──────────────────────────────────────────────────────────
const App=()=>{
  const [formData,setFormData]=useState(INITIAL_FORM);
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(LS_KEY)||'');
  const [activeTab,setActiveTab]=useState('diagramas');
  const [memorialIA,setMemorialIA]=useState('');
  const [generatingMemorial,setGeneratingMemorial]=useState(false);
  const [docsGerados,setDocsGerados]=useState({memorial:false,procuracao:false,formularioCEEE:false});
  const [uploadedFiles,setUploadedFiles]=useState([]);
  const [extractingData,setExtractingData]=useState(false);
  const [aiFilledFields,setAiFilledFields]=useState(new Set());
  const [toast,setToast]=useState(null);
  const svgRef=useRef();

  const calc=useMemo(()=>calcularSistema(formData),[formData]);

  useEffect(()=>{
    if(apiKey)localStorage.setItem(LS_KEY,apiKey);
  },[apiKey]);

  useEffect(()=>{
    if(toast){const t=setTimeout(()=>setToast(null),4000);return()=>clearTimeout(t);}
  },[toast]);

  const onChange=useCallback(e=>{
    const {name,value}=e.target;
    setFormData(p=>({...p,[name]:value}));
  },[]);

  const onExtract=useCallback((json)=>{
    const filled=new Set();
    const updates={};
    Object.entries(json).forEach(([k,v])=>{
      if(v!==null&&v!==''&&v!==undefined&&k!=='confiancaExtracao'&&k!=='camposNaoEncontrados'&&k!=='observacoes'&&k in INITIAL_FORM){
        updates[k]=String(v);
        filled.add(k);
      }
    });
    setFormData(p=>({...p,...updates}));
    setAiFilledFields(filled);
    const conf=json.confiancaExtracao||'média';
    setToast({
      message:`Dados extraídos! ${filled.size} campos preenchidos (confiança: ${conf})${conf==='baixa'?' — revise os dados':''}.`,
      type:conf==='baixa'?'warning':'success'
    });
  },[]);

  const exportarTudo=async()=>{
    setToast({message:'Exportando todos os documentos…',type:'info'});
    const delay=ms=>new Promise(r=>setTimeout(r,ms));
    // 1 — Prancha SVG
    if(svgRef.current){
      const s=new XMLSerializer().serializeToString(svgRef.current);
      const b=new Blob([s],{type:'image/svg+xml'});
      const a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download=`prancha_${formData.nomeCliente||'instalight'}.svg`;a.click();
      await delay(400);
    }
    // 2 — Memorial PDF
    exportarMemorialPDFStandalone(formData,calc,memorialIA);
    await delay(400);
    // 3 — Procuração PDF
    exportarProcuracaoPDFStandalone(formData,calc);
    await delay(400);
    // 4 — Formulário CEEE PDF
    exportarFormularioPDFStandalone(formData,calc);
    await delay(400);
    // 5 — Pendências PDF
    exportarPendenciasPDFStandalone(formData,calc,docsGerados);
    await delay(200);
    setToast({message:'✅ 5 documentos exportados (SVG + 4 PDFs)!',type:'success'});
  };

  const tabs=[
    {id:'diagramas',label:'Diagramas',icon:'📐'},
    {id:'memorial',label:'Memorial',icon:'📋'},
    {id:'documentos',label:'Documentos',icon:'📜'},
    {id:'resumo',label:'Resumo',icon:'✅'},
  ];

  const toastColors={success:'bg-green-700',error:'bg-red-700',warning:'bg-amber-600',info:'bg-blue-700'};

  return(
    <div className="flex flex-col h-screen bg-slate-100">
      {/* Header */}
      <header className="h-14 bg-gray-900 flex items-center px-4 gap-4 flex-shrink-0 border-b border-gray-800">
        {/* Logo */}
        <div className="flex items-center gap-2">
          <div className="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white font-bold text-sm">☀</div>
          <div>
            <div className="text-white font-bold text-sm leading-none">GD Docs</div>
            <div className="text-orange-400 text-xs leading-none">Instalight</div>
          </div>
        </div>
        {/* Tabs */}
        <div className="flex gap-1 ml-4">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setActiveTab(t.id)}
              className={`px-3 py-1.5 text-xs font-medium rounded transition-colors ${activeTab===t.id?'bg-orange-500 text-white':'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
              {t.icon} {t.label}
            </button>
          ))}
        </div>
        {/* Spacer */}
        <div className="flex-1"/>
        {/* API Key */}
        <div className="flex items-center gap-2">
          <span className="text-gray-400 text-xs">🔑</span>
          <input
            type="password"
            value={apiKey}
            onChange={e=>setApiKey(e.target.value)}
            placeholder="Anthropic API Key"
            className="bg-gray-800 text-gray-200 text-xs px-3 py-1.5 rounded border border-gray-700 outline-none focus:border-orange-500 w-56"
          />
        </div>
        {/* Export all */}
        <button onClick={exportarTudo} className="px-3 py-1.5 text-xs font-semibold rounded bg-orange-500 text-white hover:bg-orange-600 flex items-center gap-1">
          ⬇ Exportar Tudo
        </button>
      </header>

      {/* Body */}
      <div className="flex flex-1 overflow-hidden">
        <Sidebar
          fd={formData}
          onChange={onChange}
          calc={calc}
          apiKey={apiKey}
          onExtract={onExtract}
          uploadedFiles={uploadedFiles}
          setUploadedFiles={setUploadedFiles}
          extractingData={extractingData}
          setExtractingData={setExtractingData}
          aiFilledFields={aiFilledFields}
        />
        <main className="flex-1 overflow-hidden flex flex-col">
          {activeTab==='diagramas'&&<DiagramasTab fd={formData} calc={calc} svgRef={svgRef}/>}
          {activeTab==='memorial'&&(
            <MemorialTab
              fd={formData} calc={calc} apiKey={apiKey}
              memorialIA={memorialIA} setMemorialIA={setMemorialIA}
              generatingMemorial={generatingMemorial} setGeneratingMemorial={setGeneratingMemorial}
              setToast={setToast} setDocsGerados={setDocsGerados}
            />
          )}
          {activeTab==='documentos'&&(
            <DocumentosTab
              fd={formData} calc={calc} apiKey={apiKey}
              setToast={setToast} docsGerados={docsGerados} setDocsGerados={setDocsGerados}
            />
          )}
          {activeTab==='resumo'&&(
            <ResumoTab fd={formData} calc={calc} docsGerados={docsGerados} setToast={setToast}/>
          )}
        </main>
      </div>

      {/* Toast */}
      {toast&&(
        <div className={`toast text-white text-sm ${toastColors[toast.type]||'bg-gray-800'}`}>
          {toast.message}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
